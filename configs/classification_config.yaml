# Configuración de entrenamiento para modelo de clasificación multi-label
# Dataset: Titan Labels - Atributos de Ciclistas de Downhill

# Rutas de datos (se sobrescriben desde Colab)
data_path: null  # Se establece dinámicamente

# Modelo
model:
  # Arquitectura base: efficientnet_b0 (ligero), efficientnet_b2 (balance), resnet50 (robusto)
  backbone: efficientnet_b2
  pretrained: true
  num_classes: 116  # 117 columnas - 1 (filename)
  dropout: 0.3
  
# Entrenamiento
training:
  epochs: 80
  batch_size: 32  # Clasificación es más ligera que detección
  imgsz: 224  # Tamaño estándar para clasificación
  patience: 12  # Early stopping
  workers: 2
  
  # Optimizador
  optimizer: AdamW
  learning_rate: 0.0003
  weight_decay: 0.01
  scheduler: cosine  # cosine, step, plateau
  warmup_epochs: 5
  
  # Loss
  loss: BCE  # Binary Cross Entropy para multi-label
  label_smoothing: 0.1
  pos_weight_auto: true  # Calcular pesos automáticamente por desbalance
  
  # Augmentation
  augmentation:
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation: 15
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
    
# Validación
validation:
  val_interval: 1
  threshold: 0.5  # Umbral para clasificación binaria
  
# Guardado
save:
  save_period: 5
  project: "runs/classification"
  name: "titan_classification"

